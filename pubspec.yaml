name: gax_forge
description: GAX Forge - Professional Flutter UI Design Maker
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Local Storage
  hive_flutter: ^1.1.0
  
  # File Export
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  
  # UI Utilities
  uuid: ^4.4.0
  google_fonts: ^6.2.1
  flutter_colorpicker: ^1.1.0
  
  # Icons
  material_design_icons_flutter: ^7.0.7296

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
