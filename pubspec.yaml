name: gax_forge
description: GAX Forge - Professional Flutter UI Design Maker
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management (manual StateNotifier, no codegen needed)
  flutter_riverpod: ^2.5.1
  
  # Local Storage
  hive_flutter: ^1.1.0
  
  # File Export
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  
  # UI Utilities
  uuid: ^4.4.0
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/


