name: gax_forge
description: "Gax Forge - A Flutter UI Builder App for designing screen layouts with drag-drop widgets"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Multi-touch Gestures
  matrix_gesture_detector: ^1.0.0

  # Code Formatting
  dart_style: ^2.3.2

  # File & Storage
  path_provider: ^2.1.2
  file_picker: ^6.1.1
  shared_preferences: ^2.2.2
  share_plus: ^7.2.1

  # Utilities
  uuid: ^4.2.2
  flutter_colorpicker: ^1.0.3

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
