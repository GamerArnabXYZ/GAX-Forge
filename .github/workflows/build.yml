name: Build GAX Forge APK & Web

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # iOS 12 support ke liye stable version
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # --- ANDROID BUILD ---
      - name: Build APK (Release)
        run: |
          flutter build apk --release \
            --split-per-abi \
            --no-tree-shake-icons \
            --target-platform android-arm,android-arm64,android-x64

      - name: Build universal APK
        run: flutter build apk --release --no-tree-shake-icons

      # --- WEB BUILD (iOS 12.6 Compatible) ---
      # Hum --web-renderer html use kar rahe hain taake purane Safari browsers crash na hon
      - name: Build Web
        run: |
          flutter build web --release \
            --web-renderer html \
            --base-href "/${{ github.event.repository.name }}/"

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # --- DEPLOY WEB TO GITHUB PAGES ---
      - name: Deploy to Web Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: web-deploy # Is branch ko GitHub Pages settings mein select karein

      # --- CREATE RELEASE WITH APKs ---
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: GAX Forge v${{ steps.version.outputs.version }}
          body: |
            ## GAX Forge - Mobile & Web
            
            ### Web Version
            - Live at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
            - Supported: iOS 12.6+, Android, Desktop (HTML Renderer)
            
            ### Downloads (Android)
            - `app-arm64-v8a-release.apk` (Recommended)
            - `app-release.apk` (Universal)
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
