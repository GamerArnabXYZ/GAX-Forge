name: Build GAX Forge APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Build APK (split per ABI)
        run: |
          flutter build apk --release \
            --split-per-abi \
            --no-tree-shake-icons \
            --target-platform android-arm,android-arm64,android-x64

      - name: Build universal APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: GAX Forge v${{ steps.version.outputs.version }}
          body: |
            ## GAX Forge - Flutter UI Design Maker
            
            ### Downloads
            - `app-arm64-v8a-release.apk` → Modern 64-bit Android (recommended)
            - `app-armeabi-v7a-release.apk` → Older 32-bit Android
            - `app-x86_64-release.apk` → Android emulator / x86 devices
            - `app-release.apk` → Universal APK (all architectures)
            
            ### What's New
            - Full canvas drag-drop widget editor
            - 40+ Flutter widgets support
            - Dart code export
            - Hive local storage
            - Material 3 UI
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

